<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
    }
    .box { text-align: center; }
    .loader {
        border: 3px solid #ddd;
        border-top: 3px solid #333;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    #err { color: red; font-size: 14px; margin-top: 10px; }
</style>
</head>
<body>
<div class="box">
    <h3>Sedang memproses...</h3>
    <div class="loader"></div>
    <p id="status">Mohon tunggu sebentar</p>
    <p id="err"></p>
</div>

<script>
(function() {
    try {
        const params = new URLSearchParams(window.location.search);
        let nextUrl = params.get('next');
        
        if (!nextUrl) {
            document.getElementById('status').innerText = 'Error: URL tujuan tidak ditemukan';
            return;
        }

        // Decode kalau URL masih ke-encode 2x
        try { nextUrl = decodeURIComponent(nextUrl); } catch(e) {}

        document.getElementById('status').innerText = 'Redirect ke: ' + nextUrl;

        // Simulasi aktivitas manusia
        document.cookie = "warmup=1; path=/; max-age=3600; SameSite=Lax";
        localStorage.setItem('session_start', Date.now());
        localStorage.setItem('referrer', document.referrer || 'direct');

        setTimeout(() => {
            window.scrollTo({ top: Math.random() * 150, behavior: 'smooth' });
        }, 800);

        setTimeout(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 1500);

        // Redirect dengan fallback
        const delay = 2500 + Math.floor(Math.random() * 1500);
        setTimeout(() => {
            try {
                window.location.replace(nextUrl);
            } catch(e) {
                top.location.href = nextUrl;
            }
        }, delay);

    } catch(e) {
        document.getElementById('err').innerText = 'Error: ' + e.message;
    }
})();
</script>
</body>
</html>
