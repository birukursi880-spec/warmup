<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warming Up...</title>
<style>
  body { font-family: system-ui; text-align: center; margin-top: 20vh; color: #333; }
  #log { font-size: 12px; color: #888; margin-top: 20px; }
</style>
</head>
<body>
  <h3>Sedang memproses...</h3>
  <p id="status">Mohon tunggu sebentar</p>
  <div id="log"></div>
<script>
(async function() {
  const log = (msg) => { document.getElementById('log').innerText = msg; };
  
  try {
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    const tz = params.get('tz') || 'Asia/Jakarta';
    const lang = params.get('lang') || 'id-ID';
    const mode = params.get('mode') || 'mobile';

    if (!next) {
      document.getElementById('status').innerText = "Error: URL tujuan kosong";
      return;
    }

    log("Mode: " + mode + " | Next: " + next);

    // Spoof timezone & language
    Object.defineProperty(navigator, 'language', { get: () => lang });
    Object.defineProperty(navigator, 'languages', { get: () => [lang, 'en-US'] });
    Date.prototype.getTimezoneOffset = () => tz === 'Asia/Jakarta' ? -420 : -new Date().getTimezoneOffset();

    // Touch vs Desktop
    const isDesktop = mode === 'desktop' || !window.TouchEvent;
    Object.defineProperty(navigator, 'maxTouchPoints', { get: () => isDesktop ? 0 : 5 });

    // Simulasi interaksi
    if (isDesktop) {
      document.dispatchEvent(new MouseEvent('mousemove', { clientX: 100, clientY: 150, bubbles: true }));
      await new Promise(r => setTimeout(r, 600));
      window.scrollBy(0, 120);
      await new Promise(r => setTimeout(r, 900));
    } else {
      if (window.TouchEvent) {
        document.dispatchEvent(new TouchEvent('touchstart', { 
          touches: [{ clientX: 100, clientY: 150 }], bubbles: true 
        }));
        await new Promise(r => setTimeout(r, 600));
        window.scrollTo(0, 150);
      }
    }

    log("Redirecting to " + next);
    await new Promise(r => setTimeout(r, 1000));
    
    // Redirect dengan fallback
    try {
      window.location.replace(next);
    } catch(e) {
      top.location.href = next;
    }

  } catch (e) {
    document.getElementById('status').innerText = "Error: " + e.message;
    log(e.stack);
    // Fallback redirect setelah 3 detik
    const next = new URLSearchParams(location.search).get('next');
    if (next) setTimeout(() => top.location.href = next, 3000);
  }
})();
</script>
</body>
</html>
