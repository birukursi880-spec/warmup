<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
    }
    .box {
        text-align: center;
    }
    .loader {
        border: 3px solid #ddd;
        border-top: 3px solid #333;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>
<body>
<div class="box">
    <h3>Sedang memproses...</h3>
    <div class="loader"></div>
    <p>Mohon tunggu sebentar</p>
</div>

<script>
(function() {
    // 1. Ambil URL tujuan dari parameter ?next=
    const params = new URLSearchParams(window.location.search);
    const nextUrl = params.get('next');
    
    if (!nextUrl) {
        document.body.innerHTML = '<h3>Error: URL tujuan tidak ditemukan</h3>';
        return;
    }

    // 2. Simulasi aktivitas manusia biar natural
    document.cookie = "warmup=1; path=/; max-age=3600";
    localStorage.setItem('session_start', Date.now());
    localStorage.setItem('referrer', document.referrer || 'direct');

    // Scroll random kecil
    setTimeout(() => {
        window.scrollTo({ top: Math.random() * 150, behavior: 'smooth' });
    }, 800);

    setTimeout(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 1500);

    // 3. Redirect setelah delay random 2.5 - 4 detik
    const delay = 2500 + Math.floor(Math.random() * 1500);
    
    setTimeout(() => {
        window.location.replace(nextUrl);
    }, delay);

    // 4. Fallback kalau JS diblokir
    document.write('<noscript><meta http-equiv="refresh" content="4;url=' + nextUrl + '"></noscript>');
})();
</script>
</body>
</html>
